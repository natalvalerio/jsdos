<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    
    <!-- Ícone da Aba (Favicon) -->
    <link rel="shortcut icon" href="js-dos/favicon.ico" type="image/png">

    <!-- Configurações OpenGraph (Social Media) -->
    <title>NatDOS</title>
    <meta name="description" content="MS-DOS diretamente no navegador via Vercel.">
    
    <!-- Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://natdos.vercel.app/">
    <meta property="og:title" content="NatDOS - Nostalgia">
    <meta property="og:description" content="Experiência MS-DOS 6.22, Windows 3.11">
    <meta property="og:image" content="https://natdos.vercel.app/js-dos/favicon.ico">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://natdos.vercel.app/">
    <meta property="twitter:title" content="NatDOS - Nostalgia">
    <meta property="twitter:image" content="https://natdos.vercel.app/js-dos/favicon.ico">

    <!-- Scripts e Estilos Locais (v7) -->
    <script src="js-dos/js-dos.js"></script>
    <link href="js-dos/js-dos.css" rel="stylesheet">
	<script src="log.js" defer></script>
    
    <style>
        html, body, #jsdos { width: 100%; height: 100%; margin: 0; padding: 0; background: black; }
    </style>

	<style>
	#switch-version{
		position: fixed;
		top: 10px;
		right: 10px;
		z-index: 9999;
	
		background: #111;
		color: #0f0;
		border: 1px solid #0f0;
	
		padding: 8px 12px;
		text-decoration: none;
		font-family: monospace;
		font-size: 14px;
	
		border-radius: 4px;
	}
	
	#switch-version:hover{
		background: #0f0;
		color: #000;
	}
	</style>
</head>
<body>
	<a href="https://natdos.vercel.app/v8/" id="switch-version">Ir para v8</a>
    <div id="jsdos"></div>
    <script>
        // Define o caminho para os arquivos binários locais[cite: 1]
        emulators.pathPrefix = "js-dos/"; 
        
        Dos(document.getElementById("jsdos"), {
		//clientId: () => Promise.resolve("natdos"), 
		}).run("pacote.zip");
    </script>
</body>
</html>
