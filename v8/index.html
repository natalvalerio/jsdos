<head>
	<meta charset="UTF-8">
	
    <!-- Ícone da Aba (Favicon) -->

    <!-- Configurações OpenGraph (Social Media) -->
    <title>NatDOS V8</title>
    <meta name="description" content="MS-DOS diretamente no navegador V8.">
    
    <!-- Facebook / WhatsApp / LinkedIn -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://natdos.vercel.app/index8.html">
    <meta property="og:title" content="NatDOS - Nostalgia">

    <!-- Twitter -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="js-dos8/js-dos.js"></script>
    <link href="js-dos8/js-dos.css" rel="stylesheet">
    <style>
        html, body, #jsdos { width: 100%; height: 100%; margin: 0; padding: 0; background: black; }
    </style>
		
	<style>
	#switch-version{
		position: fixed;
		top: 10px;
		right: 10px;
		z-index: 9999;
	
		background: #111;
		color: #0ff;
		border: 1px solid #0ff;
	
		padding: 8px 12px;
		text-decoration: none;
		font-family: monospace;
		font-size: 14px;
	
		border-radius: 4px;
	}
	
	#switch-version:hover{
		background: #0ff;
		color: #000;
	}
	</style>
</head>
<body>
	<a href="https://natdos.vercel.app/" id="switch-version">Voltar v7</a>
    <div id="jsdos"></div>
	<script>
	// Verifica se o objeto Dos existe antes de tentar rodar
	if (typeof Dos !== "undefined") {
		Dos(document.getElementById("jsdos"), {
			style: "hidden", // Esconde a barra lateral se quiser algo mais limpo
		});
	} 
	
	</script>
</body>
</html>
